line-length = 120
target-version = "py312"

[lint]
select = [
  "ANN", # flake8-annotations
  "B", # flake8-bugbear
  "C4", # flake8-comprehensions
  "D", # flake8-docstrings
  "E", # pycodestyle
  "EM", # flake8-errmsg
  "F", # pyflakes
  "FA", # flake8-future-annotations
  "FBT001", # flake8-boolean-trap
  "I", # isort
  "ICN", # flake8-import-conventions
  "INT", # flake8-gettext
  "PERF", # perflint
  "PIE", # flake8-pie
  "PT", # flake8-pytest-style
  "PTH", # flake8-use-pathlib
  "PYI", # flake8-pyi
  "RUF", # ruff-specific rules
  "SIM", # flake8-simplify
  "TCH", # flake8-type-checking
  "TD", # flake8-todos
  "TID", # flake8-tidy-imports
  "TRY", # tryceratops
  "UP", # pyupgrade
  "W", # pycodestyle
]
ignore = [
# ------------------------------------------------------------------
  # TODO: Remove errors below to further improve docstring linting
  # ------------------------------------------------------------------
  "D100", # Missing docstring in public module
  "D104", # Missing docstring in public package
  "D105", # Missing docstring in magic method
  # ------------------------------------------------------------------
  "ANN401", # Dynamically typed expressions (Any) are disallowed
  "D401", # Relax NumPy docstring convention: first line should be imperative
  "E501", # Line length regulated by formatter
  "PT011", # pytest.raises is too broad, set match or use a more specific exception
  "PYI041", # Use float instead of int | float
  "RUF022", # `__all__` is not sorted
  "RUF005", # Consider expression instead of concatenation
  "SIM102", # Use a single `if` statement instead of nested `if` statements
  "SIM108", # Use ternary operator
  "SIM114", # Combine `if` branches
  "TD002", # Missing author in TODO
  "TD003", # Missing issue link on the line following this TODO
  "TRY003", # Avoid specifying long messages outside the exception class
]
unfixable = [
    "F401",
    "UP007",
]
exclude = [
    ".git",
    ".hg",
    "__pycache__",
    "_bin/*",
    "_build/*",
    "_ig_fbcode_wheel/*",
    "buck-out/*",
    "third-party-buck/*",
    "third-party2/*",
    "dist",
    ".venv",
    ".nox",
    ".mypy_cache",
    ".pytype",
    ".svn",
    "__pypackages__",
]

[lint.per-file-ignores]
"docs/source/conf.py" = [
  "ANN", # flake8-annotations
  "D", # flake8-docstrings
  "F401", # Unused import
]
"src/ctxcore/ctdb.py" = [
  "D205", # 1 blank line required between summary line and description
  "PYI051", # `Literal["x"]` is redundant in a union with `str`
  "W505", # Doc line too long
]
"src/ctxcore/datatypes.py" = [
  "D102", # Missing docstring in public method
  "D205", # 1 blank line required between summary line and description
]
"src/ctxcore/genesig.py" = [
  "D102", # Missing docstring in public method
  "ANN001", # Missing type annotation for function argument
  "ANN003", # Missing type annotation for
]
"src/ctxcore/rnkdb.py" = [
  "D102", # Missing docstring in public method
]
"tests/test_datatypes.py" = [
  "D205", # 1 blank line required between summary line and description
  "W505", # Doc line too long
]
"tests/test_featherdb.py" = [
  "D103", # Missing docstring in public function
]
"tests/test_genesig.py" = [
  "D103", # Missing docstring in public function
]
"tests/test_recovery.py" = [
  "D103", # Missing docstring in public function
]

[lint.pydocstyle]
convention = "numpy"

[lint.flake8-tidy-imports]
ban-relative-imports = "all"

[lint.flake8-type-checking]
strict = true

[lint.pycodestyle]
max-doc-length = 88

[format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

docstring-code-format = true
